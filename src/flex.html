<!DOCTYPE html>
<html>
    <head>
        <title>Flex Style</title>
        <style>
            #container{
                background-color : coral;
                border : 1px solid black;
                font-family : sans-serif;
                padding : 10px;
                display : flex;
                flex-direction : row;
                justify-content : stretch;
                align-items : baseline;
                height : 250px;
            }

            .item{
                padding : 10px 80px;
                border : 1px solid black;
                background-color : cornflowerblue;
            }

            #item1{
                flex-grow : 1;
            }

            #item2{
                flex-grow : 0;
            }

            #item3{
                flex-grow : 2
            }

            #item4{
                flex-grow : 3;
            }
        </style>
    </head>

    <body>
        <div id="container">
            <div id="item1" class="item">Item 1 Item 1 Item 1 Item 1</div>
            <div id="item2" class="item">Item 2 Item 2 Item 2 Item 2</div>
            <div id="item3" class="item">Item 3 Item 3 Item 3 Item 3</div>
            <div id="item4" class="item">Item 4 Item 4 Item 4 Item 4</div>
        </div>
    </body>
</html>
